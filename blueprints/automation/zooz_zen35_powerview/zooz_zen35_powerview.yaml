blueprint:
  name: Zooz ZEN35 → PowerView (Auto-Configuring)
  description: >
    Auto-configure ZEN35 switches to control Hunter Douglas PowerView blinds
    via scenes. Uses area + labels for zero manual entity selection.
    Big button controls load; Buttons 1–3 activate scenes (fully open,
    partially open, fully close); Button 4 toggles PowerView scheduled events.
    LEDs: active scene button stays on, others off. Assign labels, put ZEN35
    and entities in the same area, and the blueprint discovers them.
  domain: automation

  input:
    zen35_device:
      name: ZEN35 Switch
      description: Select the Zooz ZEN35 in the room with the blinds.
      selector:
        device:
          filter:
            - integration: zwave_js
              manufacturer: Zooz
              model: ZEN35

    label_fully_open:
      name: Label for "fully open" scenes
      description: >
        Label you attach to PowerView scenes that fully open shades.
        HA bug: dots in label names are stored as underscores (e.g. "powerview.scenes.open"
        becomes "powerview_scenes_open"). If the selector shows "Unknown item", open the
        dropdown and re-select the label to pick up the correct ID.
      default: powerview_scenes_open
      selector:
        label:

    label_partially_open:
      name: Label for "partially open" scenes
      description: >
        Label for scenes that partially open shades.
        HA bug: dots in label names are stored as underscores. If the selector shows
        "Unknown item", open the dropdown and re-select the label to pick up the correct ID.
      default: powerview_scenes_partially_open
      selector:
        label:

    label_fully_close:
      name: Label for "fully close" scenes
      description: >
        Label for scenes that fully close shades.
        HA bug: dots in label names are stored as underscores. If the selector shows
        "Unknown item", open the dropdown and re-select the label to pick up the correct ID.
      default: powerview_scenes_closed
      selector:
        label:

    led_theme:
      name: LED Color Theme
      description: Color scheme for the scene button LEDs.
      default: default
      selector:
        select:
          options:
            - label: "Default (buttons 1–3 white, button 4 red)"
              value: default
            - label: "Rainbow (button 1 blue, 2 green, 3 yellow, button 4 red)"
              value: rainbow

    confirm_timeout:
      name: Confirm Timeout
      description: >
        How long (in seconds) the active LED stays lit after a button press,
        then turns off. Set to 0 to keep the LED on permanently (persistent mode).
      default: 0
      selector:
        number:
          min: 0
          max: 60
          unit_of_measurement: seconds

mode: restart

variables:
  device_id: !input zen35_device
  label_fully_open: !input label_fully_open
  label_partially_open: !input label_partially_open
  label_fully_close: !input label_fully_close
  led_theme: !input led_theme
  confirm_timeout: !input confirm_timeout

trigger:
  - platform: event
    event_type: zwave_js_value_notification
    event_data:
      command_class_name: Central Scene
      device_id: !input zen35_device
    id: button_press
  - platform: homeassistant
    event: start
    id: init
  - platform: event
    event_type: automation_reloaded
    id: init

action:
  - variables:
      scene_id: "{{ trigger.event.data.label | default('') }}"
      scene_value: "{{ trigger.event.data.value | default('') }}"
      area_id: "{{ device_attr(device_id, 'area_id') }}"
      # Entities in this area with each label (only when area exists)
      entities_fully_open: >
        {% set aid = device_attr(device_id, 'area_id') %}
        {{ (label_entities(label_fully_open) | select('in', area_entities(aid)) | list) if aid else [] }}
      entities_partially_open: >
        {% set aid = device_attr(device_id, 'area_id') %}
        {{ (label_entities(label_partially_open) | select('in', area_entities(aid)) | list) if aid else [] }}
      entities_fully_close: >
        {% set aid = device_attr(device_id, 'area_id') %}
        {{ (label_entities(label_fully_close) | select('in', area_entities(aid)) | list) if aid else [] }}
      # LED colors derived from theme (button 4 is always red = 3)
      led_color_load: "{{ 6 if led_theme == 'rainbow' else 0 }}"
      led_color_b1: "{{ 1 if led_theme == 'rainbow' else 0 }}"
      led_color_b2: "{{ 2 if led_theme == 'rainbow' else 0 }}"
      led_color_b3: "{{ 5 if led_theme == 'rainbow' else 0 }}"
      # PowerView hub base URL — auto-discovered from the hunterdouglas_powerview integration.
      # Empty string when the integration is not loaded.
      hub_url: >
        {% set pv_ents = integration_entities('hunterdouglas_powerview') %}
        {% if pv_ents %}
          {% set cfg = device_attr(pv_ents | first, 'configuration_url') | default('') %}
          {{ cfg.split('/api/')[0] if cfg else '' }}
        {% else %}
          ''
        {% endif %}
      # Scheduled event IDs for scenes in this area (empty list when no hub)
      room_sched_ids: >
        {% if hub_url and area_id %}
          {% set ns = namespace(ids=[]) %}
          {% for entity in area_entities(area_id) | select('search', '^scene[.]') %}
            {% set sched_id = state_attr(entity, 'scheduledEvent_id') %}
            {% if sched_id is not none %}
              {% set ns.ids = ns.ids + [sched_id | int] %}
            {% endif %}
          {% endfor %}
          {{ ns.ids }}
        {% else %}
          []
        {% endif %}

  - choose:
      # Initialization: apply theme colors to all LEDs
      - conditions: "{{ trigger.id == 'init' }}"
        sequence:
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 6
              value: "{{ led_color_load }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 7
              value: "{{ led_color_b1 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 8
              value: "{{ led_color_b2 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 9
              value: "{{ led_color_b3 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 10
              value: 3
          - if: "{{ room_sched_ids | length > 0 }}"
            then:
              - variables:
                  init_all_events: >
                    {{ state_attr('sensor.powerview_scheduled_events', 'scheduledEventData') | default([]) }}
                  init_room_events: >
                    {{ init_all_events | selectattr('id', 'in', room_sched_ids) | list }}
                  init_opted_in: >
                    {{ init_room_events | length > 0 and
                       init_room_events | rejectattr('enabled') | list | length == 0 }}
              - service: zwave_js.set_config_parameter
                target:
                  device_id: "{{ device_id }}"
                data:
                  parameter: 5
                  value: "{{ 2 if init_opted_in else 3 }}"


      # Button 1 (Scene 001) – Fully open
      - conditions:
          - "{{ scene_id == 'Scene 001' }}"
          - "{{ scene_value == 'KeyPressed' }}"
          - "{{ entities_fully_open | length > 0 }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: "{{ entities_fully_open }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 7
              value: "{{ led_color_b1 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 2
              value: 3
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 3
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 4
              value: 2
          - if: "{{ confirm_timeout > 0 }}"
            then:
              - delay:
                  seconds: "{{ confirm_timeout }}"
              - service: zwave_js.set_config_parameter
                target:
                  device_id: "{{ device_id }}"
                data:
                  parameter: 2
                  value: 2

      # Button 2 (Scene 002) – Partially open
      - conditions:
          - "{{ scene_id == 'Scene 002' }}"
          - "{{ scene_value == 'KeyPressed' }}"
          - "{{ entities_partially_open | length > 0 }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: "{{ entities_partially_open }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 8
              value: "{{ led_color_b2 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 2
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 3
              value: 3
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 4
              value: 2
          - if: "{{ confirm_timeout > 0 }}"
            then:
              - delay:
                  seconds: "{{ confirm_timeout }}"
              - service: zwave_js.set_config_parameter
                target:
                  device_id: "{{ device_id }}"
                data:
                  parameter: 3
                  value: 2

      # Button 3 (Scene 003) – Fully close
      - conditions:
          - "{{ scene_id == 'Scene 003' }}"
          - "{{ scene_value == 'KeyPressed' }}"
          - "{{ entities_fully_close | length > 0 }}"
        sequence:
          - service: scene.turn_on
            target:
              entity_id: "{{ entities_fully_close }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 9
              value: "{{ led_color_b3 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 2
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 3
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 4
              value: 3
          - if: "{{ confirm_timeout > 0 }}"
            then:
              - delay:
                  seconds: "{{ confirm_timeout }}"
              - service: zwave_js.set_config_parameter
                target:
                  device_id: "{{ device_id }}"
                data:
                  parameter: 4
                  value: 2

      # Load button (Scene 005) – Confirm-mode LED flash only
      - conditions:
          - "{{ scene_id == 'Scene 005' }}"
          - "{{ scene_value == 'KeyPressed' }}"
          - "{{ confirm_timeout > 0 }}"
        sequence:
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 1
              value: 3
          - delay:
              seconds: "{{ confirm_timeout }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 1
              value: 2

      # Button 4 (Scene 004) – Toggle central control / PowerView scheduled events
      - conditions:
          - "{{ scene_id == 'Scene 004' }}"
          - "{{ scene_value == 'KeyPressed' }}"
          - "{{ room_sched_ids | length > 0 }}"
        sequence:
          - variables:
              current_opted_in: >
                {% set all_events = state_attr('sensor.powerview_scheduled_events', 'scheduledEventData') | default([]) %}
                {% set room_events = all_events | selectattr('id', 'in', room_sched_ids) | list %}
                {{ room_events | length > 0 and room_events | rejectattr('enabled') | list | length == 0 }}
              new_opted_in: "{{ not current_opted_in }}"
          - repeat:
              for_each: "{{ room_sched_ids }}"
              sequence:
                - service: rest_command.powerview_set_scheduled_event
                  data:
                    hub: "{{ hub_url }}"
                    id: "{{ repeat.item }}"
                    enabled: "{{ new_opted_in | lower }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 2
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 3
              value: 2
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 4
              value: 2
          # In confirm mode, blink white when opting in; otherwise use red theme color
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 10
              value: "{{ 0 if (confirm_timeout > 0 and new_opted_in) else 3 }}"
          - service: zwave_js.set_config_parameter
            target:
              device_id: "{{ device_id }}"
            data:
              parameter: 5
              value: "{{ 2 if (confirm_timeout == 0 and new_opted_in) else 3 }}"
          - if: "{{ confirm_timeout > 0 }}"
            then:
              - delay:
                  seconds: "{{ confirm_timeout }}"
              - service: zwave_js.set_config_parameter
                target:
                  device_id: "{{ device_id }}"
                data:
                  parameter: 5
                  value: 2
